name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/
      - name: Install UI dependencies
        run: cd ui && npm ci
      - name: ESLint
        run: cd ui && npx eslint .
      - name: Svelte check
        run: cd ui && npm run check

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build UI
        run: cd ui && npm install && npm run build
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -svv

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build UI
        run: cd ui && npm install && npm run build
      - name: Build package
        run: uv build
      - name: Verify wheel contents
        run: |
          python3 -m zipfile -l dist/*.whl | grep -q "cinsights/static/index.html" || (echo "FAIL: static files missing from wheel" && exit 1)
          python3 -m zipfile -l dist/*.whl | grep -q "cinsights/alembic/env.py" || (echo "FAIL: alembic files missing from wheel" && exit 1)
          STATIC_COUNT=$(python3 -m zipfile -l dist/*.whl | grep -c "cinsights/static/")
          echo "Static files in wheel: $STATIC_COUNT"
          [ "$STATIC_COUNT" -ge 10 ] || (echo "FAIL: expected at least 10 static files, got $STATIC_COUNT" && exit 1)
