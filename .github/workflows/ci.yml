name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build UI
        run: cd ui && npm install && npm run build
      - name: Install Python dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/
      - name: ESLint
        run: cd ui && npx eslint .
      - name: Svelte check
        run: cd ui && npm run check

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build UI
        run: cd ui && npm install && npm run build
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -svv

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build UI
        run: cd ui && npm install && npm run build
      - name: Build package
        run: uv build
      - name: Verify wheel contents
        run: |
          python3 -m zipfile -l dist/*.whl | grep -q "cinsights/static/index.html" || (echo "FAIL: static files missing from wheel" && exit 1)
          python3 -m zipfile -l dist/*.whl | grep -q "cinsights/alembic/env.py" || (echo "FAIL: alembic files missing from wheel" && exit 1)
          STATIC_COUNT=$(python3 -m zipfile -l dist/*.whl | grep -c "cinsights/static/")
          echo "Static files in wheel: $STATIC_COUNT"
          [ "$STATIC_COUNT" -ge 10 ] || (echo "FAIL: expected at least 10 static files, got $STATIC_COUNT" && exit 1)
      - name: Install built wheel
        run: uv pip install dist/*.whl --force-reinstall --system
      - name: Smoke test server
        run: |
          cinsights serve --port 8199 &
          SERVER_PID=$!
          sleep 3

          # Check index page loads with SvelteKit content
          curl -sf http://localhost:8199/ | grep -q "sveltekit" || (echo "FAIL: index.html missing sveltekit" && kill $SERVER_PID && exit 1)
          echo "OK: / serves SvelteKit app"

          # Check _app assets are mounted
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:8199/_app/version.json | grep -q "200" || (echo "FAIL: _app assets not served" && kill $SERVER_PID && exit 1)
          echo "OK: /_app/version.json returns 200"

          # Check API endpoint works
          curl -sf http://localhost:8199/api/sessions/stats | grep -q "total_sessions" || (echo "FAIL: API not responding" && kill $SERVER_PID && exit 1)
          echo "OK: /api/sessions/stats returns data"

          # Check SPA routing (unknown path falls back to index.html)
          curl -sf http://localhost:8199/projects | grep -q "sveltekit" || (echo "FAIL: SPA fallback broken" && kill $SERVER_PID && exit 1)
          echo "OK: /projects falls back to SPA"

          kill $SERVER_PID
          echo "All smoke tests passed"
