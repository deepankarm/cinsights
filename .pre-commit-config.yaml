repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests)/
      - id: ruff-format
        files: ^(src|tests)/

  - repo: local
    hooks:
      - id: eslint
        name: eslint (ui)
        entry: bash -c 'cd ui && npx eslint .'
        language: system
        files: '^ui/.*\.(svelte|ts|js)$'
        pass_filenames: false

      - id: svelte-check
        name: svelte-check (ui)
        entry: bash -c 'cd ui && npm run check'
        language: system
        files: '^ui/.*\.(svelte|ts)$'
        pass_filenames: false
